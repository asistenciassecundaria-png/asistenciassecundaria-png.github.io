/* RESPONSIVE MOVIL */

@media (max-width: 768px) {

	.container {

	#start-button {

		font-size: 16px;
		padding: 12px;
	}

	#qr-reader {
		width: 100% !important;
	}

	/* Tabla responsive */
	table {
		font-size: 12px;
		min-width: 600px;
	}

	/* Scroll horizontal tabla */
	#attendanceList {
		overflow-x: auto;
	}

		padding: 6px !important;
	}

		width: 100%;
		margin-top: 5px;
		font-size: 12px;

<nav class="navbar navbar-expand-lg navbar-dark bg-indigo">

<div class="container mx-auto px-4 py-8">

<h1 class="text-3xl font-bold mb-6 text-center">
Sistema de Registro de Asistencia
</h1>

<div id="groupSelection" class="mb-8">
<label for="groupSelect" class="block mb-2 font-semibold">
Selecciona un grupo:
</label>

<select id="groupSelect" class="w-full p-2 border rounded">
<option value="">Selecciona un grupo...</option>
</select>
</div>

<div id="attendanceForm" class="hidden">

<h2 class="text-2xl font-semibold mb-4">Registro de Asistencia</h2>

<div class="mb-4">
<label for="datePicker" class="block mb-2 font-semibold">Fecha:</label>
<input type="text" id="datePicker" class="w-full p-2 border rounded"/>
</div>

<div id="qr-reader-container" class="container mx-auto p-4">
<h1 class="text-3xl font-bold mb-4 text-center text-blue-600">
Utilizar Escáner de Código QR
</h1>

<div id="qr-reader" class="w-full max-w-md mx-auto"></div>

<button id="start-button" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 w-full max-w-md mx-auto block">
Iniciar Cámara
</button>
</div>

</div>

<div id="attendanceList" class="mt-8 hidden">
<h2 class="text-2xl font-semibold mb-4">Lista de Asistencia</h2>

<table class="min-w-full bg-white border border-gray-300">
<thead>
<tr>
<th class="py-2 px-4 border-b">ID</th>
<th class="py-2 px-4 border-b">Nombre</th>
<th class="py-2 px-4 border-b">Asistencia</th>
<th class="py-2 px-4 border-b">Contactar</th>
<th class="py-2 px-4 border-b">Acción</th>
</tr>
</thead>

<tbody id="attendanceItems"></tbody>
</table>

</div>
