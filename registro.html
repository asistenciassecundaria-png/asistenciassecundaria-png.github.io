<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asistencia - Registro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.bg-indigo { background-color: #4b0082; }

/* RESPONSIVE */
@media (max-width: 768px) {
.container { padding-left: 10px !important; padding-right: 10px !important; }
h1 { font-size: 1.5rem; }
table { font-size: 12px; min-width: 600px; }
#attendanceList { overflow-x: auto; }
}
</style>
</head>

<body class="bg-gray-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-indigo">
<div class="container-fluid">
<a class="navbar-brand" href="index.html">&#8592; Regresar</a>
</div>
</nav>

<div class="container mx-auto px-4 py-8">

<h1 class="text-3xl font-bold mb-6 text-center">
Sistema de Registro de Asistencia
</h1>

<div id="groupSelection" class="mb-8">
<label class="block mb-2 font-semibold">Selecciona un grupo:</label>
<select id="groupSelect" class="w-full p-2 border rounded">
<option value="">Selecciona un grupo...</option>
</select>
</div>

<div id="attendanceForm" class="hidden">

<h2 class="text-2xl font-semibold mb-4">Registro de Asistencia</h2>

<input type="text" id="datePicker" class="w-full p-2 border rounded mb-4"/>

<div id="qr-reader"></div>

<button id="start-button" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded w-full">
Iniciar Cámara
</button>

</div>

<div id="attendanceList" class="mt-8 hidden">
<h2 class="text-2xl font-semibold mb-4">Lista</h2>

<table class="min-w-full bg-white border">
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Asistencia</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="attendanceItems"></tbody>
</table>

</div>
</div>

<script>
$(document).ready(function () {

let currentGroup = null;
const grupos = JSON.parse(localStorage.getItem("grupos")) || {};

// cargar grupos
for (const [id, group] of Object.entries(grupos)) {
$("#groupSelect").append(`<option value="${id}">${group.nombre}</option>`);
}

// fecha
flatpickr("#datePicker", {
dateFormat: "Y-m-d",
defaultDate: "today"
});

// seleccionar grupo
$("#groupSelect").change(function () {
currentGroup = $(this).val();

if (currentGroup) {
$("#attendanceForm").removeClass("hidden");
$("#attendanceList").removeClass("hidden");
updateAttendanceList();
}
});

// registrar asistencia
function registerAttendance(date, studentId) {

const group = grupos[currentGroup];
const student = group.personas.find(p => p.id === studentId);

if (!student) return;

const attendance = JSON.parse(localStorage.getItem("attendance")) || {};

if (!attendance[currentGroup]) attendance[currentGroup] = {};
if (!attendance[currentGroup][date]) attendance[currentGroup][date] = [];

if (!attendance[currentGroup][date].includes(studentId)) {
attendance[currentGroup][date].push(studentId);
localStorage.setItem("attendance", JSON.stringify(attendance));

swal(student.nombre, "Asistencia registrada", "success");
updateAttendanceList();
}
}

// tabla
function updateAttendanceList() {

const date = $("#datePicker").val();
const attendance = JSON.parse(localStorage.getItem("attendance")) || {};

const groupAttendance =
attendance[currentGroup] && attendance[currentGroup][date]
? attendance[currentGroup][date]
: [];

$("#attendanceItems").empty();

grupos[currentGroup].personas.forEach(student => {

const present = groupAttendance.includes(student.id);

$("#attendanceItems").append(`
<tr>
<td>${student.id}</td>
<td>${student.nombre}</td>
<td>${present ? "✅" : "❌"}</td>
<td>
<button onclick="registerAttendance('${date}','${student.id}')" class="bg-green-500 text-white px-2 py-1 rounded">
Registrar
</button>
</td>
</tr>
`);

});
}

// QR
let scanner = null;

$("#start-button").click(function () {

if (!scanner) {

scanner = new Html5Qrcode("qr-reader");

scanner.start(
{ facingMode: "environment" },
{ fps: 10, qrbox: 250 },
(decodedText) => {
const date = $("#datePicker").val();
registerAttendance(date, decodedText);
}
);

$(this).text("Detener Cámara");

} else {

scanner.stop();
scanner = null;
$(this).text("Iniciar Cámara");

}

});

});
</script>

</body>
</html>
