	<body class="bg-gray-100">
		<nav class="navbar navbar-expand-lg navbar-dark bg-indigo">

				<a class="navbar-brand" href="index.html">&#8592; Regresar</a>

		<div class="container mx-auto px-4 py-8">
			<h1 class="text-3xl font-bold mb-6 text-center">
				Sistema de Registro de Asistencia
			</h1>

			<div id="groupSelection" class="mb-8">
				<label for="groupSelect" class="block mb-2 font-semibold"
					>Selecciona un grupo:</label
				>
				<select id="groupSelect" class="w-full p-2 border rounded">
					<option value="">Selecciona un grupo...</option>
				</select>
			</div>

			<div id="attendanceForm" class="hidden">
				<h2 class="text-2xl font-semibold mb-4">Registro de Asistencia</h2>
				<div class="mb-4">
					<label for="datePicker" class="block mb-2 font-semibold"
						>Fecha:</label
					>
					<input
						type="text"
						id="datePicker"
						class="w-full p-2 border rounded"
					/>
				</div>

				<div id="qr-reader-container" class="container mx-auto p-4">
					<h1 class="text-3xl font-bold mb-4 text-center text-blue-600">
						Utilizar Escáner de Código QR
					</h1>
					<div id="qr-reader" class="w-full max-w-md mx-auto"></div>
					<button
						id="start-button"
						class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition duration-300 ease-in-out w-full max-w-md mx-auto block"
					>
						Iniciar Cámara
					</button>
				</div>

				<!-- <div class="mb-4">
					<label for="studentId" class="block mb-2 font-semibold"
						>ID del Estudiante:</label
					>
					<input
						type="text"
						id="studentId"
						class="w-full p-2 border rounded"
						placeholder="Ingrese el ID del estudiante"
					/>
				</div>
				<button
					id="registerAttendance"
					class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
				>
					Registrar Asistencia
				</button> -->
			</div>

			<div id="attendanceList" class="mt-8 hidden">
				<h2 class="text-2xl font-semibold mb-4">Lista de Asistencia</h2>
				<table class="min-w-full bg-white border border-gray-300">
					<thead>
						<tr>
							<th class="py-2 px-4 border-b">ID</th>
							<th class="py-2 px-4 border-b">Nombre</th>
							<th class="py-2 px-4 border-b">Asistencia</th>
							<th class="py-2 px-4 border-b">Contactar</th>
							<th class="py-2 px-4 border-b">Acción</th>
						</tr>
					</thead>
					<tbody id="attendanceItems"></tbody>
				</table>
			</div>
		</div>

		<script>
			$(document).ready(function () {
				let currentGroup = null;
				const grupos = JSON.parse(localStorage.getItem("grupos")) || {};

				// Populate group select
				for (const [id, group] of Object.entries(grupos)) {
					$("#groupSelect").append(
						$("<option>", {
							value: id,
							text: group.nombre
						})
					);
				}

				// Initialize date pickers
				flatpickr("#datePicker", {
					dateFormat: "Y-m-d",
					defaultDate: "today"
				});
				flatpickr("#startDate", {
					dateFormat: "Y-m-d"
				});
				flatpickr("#endDate", {
					dateFormat: "Y-m-d"
				});

				// Group selection
				$("#groupSelect").change(function () {
					currentGroup = $(this).val();
					if (currentGroup) {
						$("#attendanceForm").removeClass("hidden");
						$("#attendanceList").removeClass("hidden");
						updateAttendanceList();
					} else {
						$("#attendanceForm").addClass("hidden");
						$("#attendanceList").addClass("hidden");
					}
				});

				// Seleccionar automaticamente el primer grupo
				if (Object.keys(grupos).length > 0) {
					$("#groupSelect").val(Object.keys(grupos)[0]);
					$("#groupSelect").change();
				}

				// Register attendance
				$("#registerAttendance").click(function () {
					const date = $("#datePicker").val();
					const studentId = $("#studentId").val().trim().toUpperCase();
					registerAttendance(date, studentId);
				});
				registerAttendance = function (date, studentId) {
					if (!date || !studentId) {
						alert(
							"Por favor, ingrese una fecha y un ID de estudiante válidos."
						);
						return;
					}

					const group = grupos[currentGroup];
					const student = group.personas.find((p) => p.id === studentId);

					if (!student) {
						alert("ID de estudiante no encontrado en este grupo.");
						return;
					}

					const attendance =
						JSON.parse(localStorage.getItem("attendance")) || {};
					if (!attendance[currentGroup]) {
						attendance[currentGroup] = {};
					}
					if (!attendance[currentGroup][date]) {
						attendance[currentGroup][date] = [];
					}

					if (!attendance[currentGroup][date].includes(studentId)) {
						attendance[currentGroup][date].push(studentId);
						localStorage.setItem("attendance", JSON.stringify(attendance));
						updateAttendanceList();

						swal({
							title: student.nombre,
							text: "Asistencia registrada correctamente",
							icon: "success",
							button: false,
							timer: 1500
						});

						$("#studentId").val("");
					} else {
						// alert(
						// 	"La asistencia ya ha sido registrada para este estudiante en esta fecha."
						// );
					}
				};

				// Remove attendance
				removeAttendance = function (id, nombre) {
					const date = $("#datePicker").val();
					const attendance = JSON.parse(localStorage.getItem("attendance"));
					const groupAttendance = attendance[currentGroup][date];
					const index = groupAttendance.indexOf(id);
					if (index > -1) {
						groupAttendance.splice(index, 1);
						localStorage.setItem("attendance", JSON.stringify(attendance));
						updateAttendanceList();

						swal({
							title: nombre,
							text: "La asistencia se ha quitado correctamente",
							icon: "error",
							button: false,
							timer: 1500
						});
					}
				};

				// Update attendance list
				function updateAttendanceList() {
					const attendance =
						JSON.parse(localStorage.getItem("attendance")) || {};
					const date = $("#datePicker").val();
					const groupAttendance =
						attendance[currentGroup] && attendance[currentGroup][date]
							? attendance[currentGroup][date]
							: [];

					$("#attendanceItems").empty();
					grupos[currentGroup].personas.forEach((student) => {
						const present = groupAttendance.includes(student.id);
						const row = $("<tr>", {
							html: `
								<td class="py-2 px-4 border-b">${student.id}</td>
								<td class="py-2 px-4 border-b">${student.nombre}</td>
								<td class="py-2 px-4 border-b">${present ? "✅" : "❌"}</td>
								<td class="py-2 px-4 border-b">
									<a href="https://wa.me/${
										student.telefono
									}" target="_blank" class="text-green-500">
										<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-message-circle"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
									</a>
								</td>
								<td class="py-2 px-4 border-b">
									${
										present
											? `<button onclick="removeAttendance('${student.id}', '${student.nombre}')" class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">Quitar registro</button>`
											: `<button onclick="registerAttendance('${date}', '${student.id}')" class="bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600">Registrar Asistencia</button>`
									}
								</td>
							`
						});
						$("#attendanceItems").append(row);
					});
				}

				// Escanear QR
				function onScanSuccess(decodedText, decodedResult) {
					// Esta es la función que se ejecutará cuando se lea un código QR
					console.log(`Código QR escaneado: ${decodedText}`, decodedResult);

					const date = $("#datePicker").val();
					const studentId = decodedText.trim().toUpperCase();
					registerAttendance(date, studentId);
					// Aquí puedes agregar tu lógica personalizada
				}

				function onScanFailure(error) {
					// Manejar errores de escaneo aquí
					//console.warn(`Fallo al escanear código QR: ${error}`);
				}

				let html5QrcodeScanner = null;

				document
					.getElementById("start-button")
					.addEventListener("click", () => {
						if (html5QrcodeScanner === null) {
							html5QrcodeScanner = new Html5QrcodeScanner(
								"qr-reader",
								{ fps: 10, qrbox: { width: 250, height: 250 } },
								/* verbose= */ false
							);
							html5QrcodeScanner.render(onScanSuccess, onScanFailure);
							document.getElementById("start-button").textContent =
								"Detener Cámara";
						} else {
							html5QrcodeScanner.clear();
							html5QrcodeScanner = null;
							document.getElementById("start-button").textContent =
								"Iniciar Cámara";
						}
					});

				// Export to CSV
				$("#exportCsv").click(function () {
					const startDate = $("#startDate").val();
					const endDate = $("#endDate").val();

					if (!startDate || !endDate || !currentGroup) {
						alert(
							"Por favor, seleccione un grupo y un rango de fechas válido."
						);
						return;
					}

					const attendance =
						JSON.parse(localStorage.getItem("attendance")) || {};
					const groupAttendance = attendance[currentGroup] || {};
					const group = grupos[currentGroup];

					// Generate array of dates between start and end
					const dateArray = [];
					const start = new Date(startDate);
					const end = new Date(endDate);
					for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
						dateArray.push(d.toISOString().split("T")[0]);
					}

					// Create CSV header
					let csvContent = "data:text/csv;charset=utf-8,Nombre/ID,";
					csvContent += dateArray.join(",") + "\n";

					// Add data for each student
					group.personas.forEach((student) => {
						csvContent += `${student.nombre} (${student.id}),`;
						csvContent +=
							dateArray
								.map((date) => {
									return groupAttendance[date] &&
										groupAttendance[date].includes(student.id)
										? "1"
										: "0";
								})
								.join(",") + "\n";
					});

					const encodedUri = encodeURI(csvContent);
					const link = document.createElement("a");
					link.setAttribute("href", encodedUri);
					link.setAttribute(
						"download",
						`asistencia_${currentGroup}_${startDate}_${endDate}.csv`
					);
					document.body.appendChild(link);
					link.click();
				});

				// Update attendance list when date changes
				$("#datePicker").change(updateAttendanceList);
			});
		</script>
	</body>
