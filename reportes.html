<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.bg-indigo { background-color: #4b0082; }
.attendance-table { overflow-x: auto; }
.attendance-table table { border-collapse: collapse; width: 100%; }
.attendance-table th, .attendance-table td {
	border: 1px solid #ddd;
	padding: 8px;
	text-align: center;
}
.attendance-table th { background-color: #f2f2f2; }
</style>
</head>

<body class="bg-gray-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-indigo">
<div class="container-fluid">
<a class="navbar-brand" href="index.html">&#8592; Regresar</a>
</div>
</nav>

<div class="container mx-auto px-4 py-8">
<h1 class="text-3xl font-bold mb-6 text-center">Reporte de Asistencias</h1>

<div id="groupSelection" class="mb-8">
<label for="groupSelect" class="block mb-2 font-semibold">Selecciona un grupo:</label>
<select id="groupSelect" class="w-full p-2 border rounded">
<option value="">Selecciona un grupo...</option>
</select>
</div>

<div class="mt-8">
<h2 class="text-2xl font-semibold mb-4">Seleccionar Fechas</h2>
<div class="flex space-x-4">
<label for="startDate" class="block mb-2 font-semibold">Fecha inicial:</label>
<input type="text" id="startDate" class="w-1/2 p-2 border rounded"/>

<label for="endDate" class="block mb-2 font-semibold">Fecha final:</label>
<input type="text" id="endDate" class="w-1/2 p-2 border rounded"/>
</div>

<button id="exportCsv" class="mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
Exportar a CSV
</button>
</div>

<div id="attendanceList" class="mt-8 attendance-table hidden">
<h2 class="text-2xl font-semibold mb-4">Lista de Asistencias</h2>
<div id="attendanceTable"></div>
</div>
</div>

<script>
$(document).ready(function () {

let currentGroup = null;
const grupos = JSON.parse(localStorage.getItem("grupos")) || {};

// llenar grupos
for (const [id, group] of Object.entries(grupos)) {
	$("#groupSelect").append(
		$("<option>", { value: id, text: group.nombre })
	);
}

// =====================
// RESTAURAR DATOS
// =====================
const savedStartDate = localStorage.getItem("startDate");
const savedEndDate = localStorage.getItem("endDate");
const savedGroup = localStorage.getItem("selectedGroup");

// fechas
if (savedStartDate && savedEndDate) {
	$("#startDate").val(savedStartDate);
	$("#endDate").val(savedEndDate);
} else {
	$("#endDate").val(new Date().toISOString().split("T")[0]);
	$("#startDate").val(
		new Date(new Date().setDate(new Date().getDate() - new Date().getDay()))
		.toISOString().split("T")[0]
	);
}

// grupo
if (savedGroup) {
	$("#groupSelect").val(savedGroup);
	currentGroup = savedGroup;
	$("#attendanceList").removeClass("hidden");
}

// =====================
// DATEPICKERS
// =====================
flatpickr("#startDate", {
	dateFormat: "Y-m-d",
	onChange: function(selectedDates, dateStr) {
		localStorage.setItem("startDate", dateStr);
		updateAttendanceList();
	}
});

flatpickr("#endDate", {
	dateFormat: "Y-m-d",
	onChange: function(selectedDates, dateStr) {
		localStorage.setItem("endDate", dateStr);
		updateAttendanceList();
	}
});

// =====================
// CAMBIO DE GRUPO
// =====================
$("#groupSelect").change(function () {
	currentGroup = $(this).val();

	if (currentGroup) {
		localStorage.setItem("selectedGroup", currentGroup);
		$("#attendanceList").removeClass("hidden");
		updateAttendanceList();
	} else {
		$("#attendanceList").addClass("hidden");
	}
});

// =====================
// FUNCION PRINCIPAL
// =====================
function updateAttendanceList() {

const startDate = $("#startDate").val();
const endDate = $("#endDate").val();

if (!startDate || !endDate || !currentGroup) return;

const attendance = JSON.parse(localStorage.getItem("attendance")) || {};
const groupAttendance = attendance[currentGroup] || {};
const group = grupos[currentGroup];

const dateArray = [];
const start = new Date(startDate);
const end = new Date(endDate);

for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
	dateArray.push(d.toISOString().split("T")[0]);
}

let tableContent = "<table><tr><th>Nombre/ID</th>";

dateArray.forEach(date => {
	tableContent += `<th>${date}</th>`;
});

tableContent += "</tr>";

group.personas.forEach(student => {
	tableContent += `<tr><td>${student.nombre} (${student.id})</td>`;

	dateArray.forEach(date => {
		const isPresent = groupAttendance[date] && groupAttendance[date].includes(student.id);
		tableContent += `<td>${isPresent ? "✅" : "❌"}</td>`;
	});

	tableContent += "</tr>";
});

tableContent += "</table>";

$("#attendanceTable").html(tableContent);
}

// =====================
// EXPORTAR CSV
// =====================
$("#exportCsv").click(function () {

const startDate = $("#startDate").val();
const endDate = $("#endDate").val();

if (!startDate || !endDate || !currentGroup) {
	alert("Selecciona grupo y fechas");
	return;
}

const attendance = JSON.parse(localStorage.getItem("attendance")) || {};
const groupAttendance = attendance[currentGroup] || {};
const group = grupos[currentGroup];

const dateArray = [];
const start = new Date(startDate);
const end = new Date(endDate);

for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
	dateArray.push(d.toISOString().split("T")[0]);
}

let csvContent = "data:text/csv;charset=utf-8,Nombre/ID," + dateArray.join(",") + "\n";

group.personas.forEach(student => {
	csvContent += `${student.nombre} (${student.id}),`;

	csvContent += dateArray.map(date => {
		return groupAttendance[date] && groupAttendance[date].includes(student.id) ? "1" : "0";
	}).join(",") + "\n";
});

const link = document.createElement("a");
link.setAttribute("href", encodeURI(csvContent));
link.setAttribute("download", `asistencia_${currentGroup}_${startDate}_${endDate}.csv`);
document.body.appendChild(link);
link.click();

});

// =====================
updateAttendanceList();

});
</script>

</body>
</html>
